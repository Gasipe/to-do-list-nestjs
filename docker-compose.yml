services:
  mysql:
    image: mysql:oraclelinux9
    container_name: mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: Teste_123
      MYSQL_DATABASE: mydatabase
    ports:
      - "3305:3306"
    volumes:
      - mysql-data:/var/lib/mysql

  backend:
    build: ./backend
    depends_on:
      - mysql
    ports:
      - "3000:3000"

  frontend:
    build: ./frontend
    depends_on:
      - backend
    ports:
      - "4200:4200"

volumes:
  mysql-data:
