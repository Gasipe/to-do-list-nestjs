<mat-card class="todo-card">
  <mat-card-title>📝 To-Do List</mat-card-title>
  <h1>Organize your day simply and efficiently.</h1>

  <form [formGroup]="todoForm">
    <mat-card class="todo-form">
      <mat-form-field appearance="fill">
        <mat-label>Title</mat-label>
        <input matInput type="text" placeholder="Task title" formControlName="title" />
      </mat-form-field>
      <mat-form-field appearance="fill">
        <mat-label>Description</mat-label>
        <input matInput type="text" placeholder="Task description" formControlName="description" />
      </mat-form-field>

      <mat-card-actions>
        <button
          mat-raised-button
          color="primary"
          (click)="saveTodo(todoForm.get('title')?.value, todoForm.get('description')?.value)"
        >
          Save
        </button>
      </mat-card-actions>
    </mat-card>

    <table mat-table [dataSource]="listTodo" class="mat-table">
      <ng-container matColumnDef="id">
        <th mat-header-cell *matHeaderCellDef>ID.</th>
        <td mat-cell *matCellDef="let element">{{ element.id }}</td>
      </ng-container>

      <ng-container matColumnDef="title">
        <th mat-header-cell *matHeaderCellDef>Title</th>
        <td mat-cell *matCellDef="let element">{{ element.title }}</td>
      </ng-container>

      <ng-container matColumnDef="description">
        <th mat-header-cell *matHeaderCellDef>Description</th>
        <td mat-cell *matCellDef="let element">{{ element.description }}</td>
      </ng-container>

      <ng-container matColumnDef="actions" class="buttons-actions">
        <th mat-header-cell *matHeaderCellDef>Actions</th>
        <td mat-cell *matCellDef="let element">
          <button matMiniFab color="accent" (click)="getToDoById(element.id)" class="button-edit">
            <mat-icon>edit</mat-icon>
          </button>
          <button matMiniFab color="warn" (click)="deleteTodo(element.id)">
            <mat-icon>delete</mat-icon>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
    </table>
  </form>
</mat-card>
